<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>מנוע המחקר</title>
  <script>
    // GitHub Pages SPA redirect: save current URL, redirect to app root.
    // The main index.html will restore the original path via history.replaceState.
    sessionStorage.setItem('spa_redirect', JSON.stringify({
      path: window.location.pathname,
      search: window.location.search,
      hash: window.location.hash
    }));
  </script>
  <meta http-equiv="refresh" content="0;URL='/research-engine/'">
</head>
</html>
