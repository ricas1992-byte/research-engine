<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מנוע המחקר — יותם</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore path saved by 404.html (GitHub Pages SPA routing).
      (function () {
        var raw = sessionStorage.getItem('spa_redirect');
        if (!raw) return;
        sessionStorage.removeItem('spa_redirect');
        try {
          var d = JSON.parse(raw);
          var base = '/research-engine';
          var path = d.path.startsWith(base) ? d.path.slice(base.length) : d.path;
          if (!path) path = '/';
          window.history.replaceState(null, '', base + path + d.search + d.hash);
        } catch (e) { /* ignore parse errors */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
